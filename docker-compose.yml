# ShopBrasil — Atividade 01 (Apache Airflow)
# Airflow 2.9.x + PostgreSQL (metadata DB + base analítica destino)

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-meta/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfd7cA="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: "America/Sao_Paulo"
    AIRFLOW__WEBSERVER__SECRET_KEY: "shopbrasil-secret-key"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    # Providers e libs extras necessárias para o pipeline
    _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-postgres==5.11.0 requests==2.32.3"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres-meta:
      condition: service_healthy
  networks:
    - airflow-net

services:
  # Banco de metadados do Airflow
  postgres-meta:
    image: postgres:16
    container_name: airflow-meta-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-meta-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - airflow-net

  # Banco analítico destino do pipeline (painel de pricing)
  postgres-shopbrasil:
    image: postgres:16
    container_name: shopbrasil-analytics-db
    environment:
      POSTGRES_USER: shopbrasil
      POSTGRES_PASSWORD: shopbrasil123
      POSTGRES_DB: shopbrasil_analytics
    volumes:
      - postgres-shopbrasil-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"        # acessível em localhost:5433 para inspeção externa
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "shopbrasil"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - airflow-net

  # Inicialização: db migrate + usuário admin + Connection + Pool
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname ShopBrasil \
          --role Admin \
          --email admin@shopbrasil.local \
          --password admin
        airflow connections add postgres_shopbrasil \
          --conn-type postgres \
          --conn-host postgres-shopbrasil \
          --conn-login shopbrasil \
          --conn-password shopbrasil123 \
          --conn-schema shopbrasil_analytics \
          --conn-port 5432
        airflow pools set ecommerce_pool 2 "Limita concorrência das tasks de calculo por categoria"
        echo "=== Airflow inicializado. Acesse http://localhost:8080 ==="
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
    depends_on:
      postgres-meta:
        condition: service_healthy
      postgres-shopbrasil:
        condition: service_healthy

  # Scheduler
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # Webserver (UI)
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-meta-data:
  postgres-shopbrasil-data:

networks:
  airflow-net:
    driver: bridge
